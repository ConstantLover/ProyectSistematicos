<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistematicos · Asistente Legal Guatemala</title>
  
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0b14;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      padding: 16px 24px;
      background: #11131f;
      border-bottom: 1px solid #2a2e42;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid #c9a84c;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c9a84c;
      font-size: 20px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #c9a84c;
    }

    .logo span {
      font-weight: 300;
      color: #8a8680;
    }

    .header-subtitle {
      font-size: 11px;
      color: #6b6d8c;
      margin-top: 2px;
    }

    .header-stats {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 6px 12px;
      background: #1a1d2d;
      border: 1px solid #2a2e42;
      border-radius: 30px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-icon {
      color: #c9a84c;
      font-size: 14px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 9px;
      color: #6b6d8c;
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      height: 24px;
      background: #2a2e42;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf7a;
      border-radius: 50%;
      box-shadow: 0 0 12px #4caf7a;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* Figure Navigation */
    .figure-nav {
      padding: 12px 24px;
      background: #11131f;
      border-bottom: 1px solid #2a2e42;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .figure-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }

    .figure-bar::-webkit-scrollbar {
      display: none;
    }

    .figure-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid #2a2e42;
      background: transparent;
      color: #b0b0c0;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 500;
    }

    .figure-btn:hover {
      border-color: #3a3f55;
      color: #f0f0f0;
      background: #1a1d2d;
    }

    .figure-btn.active {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
      color: #e8c97a;
      box-shadow: 0 0 15px rgba(201, 168, 76, 0.25);
    }

    .figure-nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-scroll-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
      color: #b0b0c0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-scroll-btn:hover:not(:disabled) {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    .nav-scroll-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .add-figure-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px dashed #3a3f55;
      background: #1a1d2d;
      color: #b0b0c0;
      cursor: pointer;
      font-size: 13px;
    }

    .add-figure-btn:hover {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    /* Main Layout */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #11131f;
      border-right: 1px solid #2a2e42;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 16px 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #6b6d8c;
      border-bottom: 1px solid #2a2e42;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header i {
      color: #c9a84c;
    }

    .figure-card {
      padding: 20px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid #2a2e42;
    }

    .figure-avatar {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 2px solid;
      background: #0a0b14;
    }

    .figure-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .figure-role {
      font-size: 10px;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .figure-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 9px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    /* Areas Grid */
    .areas-grid {
      padding: 16px 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .area-card {
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
      cursor: pointer;
      transition: all 0.2s;
    }

    .area-card:hover {
      border-color: #3a3f55;
    }

    .area-card.active {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
    }

    .area-name {
      font-size: 12px;
      font-weight: 600;
    }

    .area-code {
      font-size: 9px;
      color: #6b6d8c;
    }

    /* Quick Topics */
    .topics-container {
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .topic-btn {
      text-align: left;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: #1a1d2d;
      color: #b0b0c0;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .topic-btn:hover {
      border-color: #2a2e42;
      background: #2a2e42;
      color: #f0f0f0;
    }

    /* Disclaimer */
    .disclaimer {
      padding: 16px 20px;
      font-size: 10px;
      color: #6b6d8c;
      background: #1a1d2d;
      border-top: 1px solid #2a2e42;
      display: flex;
      gap: 10px;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0b14;
    }

    .chat-persona-bar {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2e42;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #11131f;
      flex-shrink: 0;
    }

    .persona-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid;
      background: #1a1d2d;
    }

    .persona-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
    }

    .persona-desc {
      font-size: 11px;
      color: #6b6d8c;
    }

    .persona-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #1a1d2d;
      border: 1px solid #2a2e42;
      border-radius: 30px;
      font-size: 11px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      display: flex;
      gap: 14px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    .msg.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
    }

    .msg.user .msg-bubble {
      background: #2a2e42;
      border-radius: 18px 4px 18px 18px;
    }

    .msg.assistant .msg-bubble {
      border-radius: 4px 18px 18px 18px;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .msg-name {
      font-weight: 600;
      text-transform: uppercase;
    }

    .msg-time {
      color: #6b6d8c;
      font-size: 10px;
    }

    .msg-text strong {
      color: #e8c97a;
    }

    .msg-text .legal-ref {
      color: #4c9fcf;
      font-weight: 500;
    }

    /* Welcome Message */
    .welcome-msg {
      text-align: center;
      padding: 60px 20px;
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #1a1d2d;
      border: 2px solid #2a2e42;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #c9a84c;
    }

    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 12px;
      color: #b0b0c0;
    }

    .welcome-sub {
      font-size: 13px;
      color: #6b6d8c;
    }

    /* Input Area */
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid #2a2e42;
      background: #11131f;
      flex-shrink: 0;
    }

    .attachments-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #1a1d2d;
      border: 1px solid #2a2e42;
      border-radius: 30px;
      font-size: 11px;
    }

    .attachment-chip img {
      width: 28px;
      height: 28px;
      border-radius: 20px;
      object-fit: cover;
    }

    .remove-btn {
      cursor: pointer;
      color: #6b6d8c;
      margin-left: 4px;
    }

    .remove-btn:hover {
      color: #e34f4f;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
    }

    textarea {
      width: 100%;
      background: #1a1d2d;
      border: 1px solid #2a2e42;
      border-radius: 24px;
      padding: 14px 18px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
    }

    textarea:focus {
      border-color: #c9a84c;
    }

    .upload-btn {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
      color: #b0b0c0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .upload-btn input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 24px;
      border: none;
      background: #c9a84c;
      color: #0a0b14;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Typing */
    .typing-dots {
      display: flex;
      gap: 6px;
      padding: 8px 4px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b6d8c;
      animation: typing 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #11131f;
      border: 1px solid #2a2e42;
      border-radius: 32px;
      width: 560px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #c9a84c;
      margin-bottom: 8px;
    }

    .preset-figures {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .preset-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #2a2e42;
      background: #1a1d2d;
      cursor: pointer;
    }

    .preset-card.selected {
      border-color: #c9a84c;
      background: rgba(201, 168, 76, 0.1);
    }

    .preset-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .preset-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .preset-desc {
      font-size: 11px;
      color: #6b6d8c;
    }

    .modal-divider {
      text-align: center;
      font-size: 11px;
      color: #6b6d8c;
      margin: 16px 0;
      position: relative;
    }

    .modal-divider::before,
    .modal-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #2a2e42;
    }

    .modal-divider::before { left: 0; }
    .modal-divider::after { right: 0; }

    .custom-inputs {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .modal-input,
    .modal-textarea {
      width: 100%;
      background: #1a1d2d;
      border: 1px solid #2a2e42;
      border-radius: 12px;
      padding: 12px 16px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }

    .modal-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-cancel, .btn-add {
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #2a2e42;
      color: #b0b0c0;
    }

    .btn-add {
      background: #c9a84c;
      border: none;
      color: #0a0b14;
    }

    /* Scroll */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #11131f;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2e42;
      border-radius: 2px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <div class="logo-icon">
      <i class="fas fa-scale-balanced"></i>
    </div>
    <div>
      <div class="logo">Sistem<span>aticos</span></div>
      <div class="header-subtitle">Asistente Legal · Guatemala</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <i class="fas fa-user-shield stat-icon"></i>
      <div>
        <div class="stat-value" id="statFiguras">6</div>
        <div class="stat-label">Figuras</div>
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <i class="fas fa-book stat-icon"></i>
      <div>
        <div class="stat-value" id="statCodigos">12</div>
        <div class="stat-label">Códigos</div>
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span>Activo</span>
    </div>
  </div>
</header>

<div class="figure-nav">
  <div class="figure-bar" id="figureBar"></div>
  <div class="figure-nav-actions">
    <button class="nav-scroll-btn" id="scrollLeft"><i class="fas fa-chevron-left"></i></button>
    <button class="add-figure-btn" onclick="openModal()"><i class="fas fa-plus-circle"></i> Nueva</button>
    <button class="nav-scroll-btn" id="scrollRight"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header"><i class="fas fa-user-shield"></i> Figura Activa</div>
    <div class="figure-card" id="sidebarFigureCard"></div>
    
    <div class="sidebar-header"><i class="fas fa-scale-balanced"></i> Áreas Legales</div>
    <div class="areas-grid" id="areaList"></div>
    
    <div class="sidebar-header"><i class="fas fa-lightbulb"></i> Preguntas Rápidas</div>
    <div class="topics-container" id="quickTopics"></div>
    
    <div class="disclaimer">
      <i class="fas fa-info-circle"></i>
      <div>Orientación basada en legislación guatemalteca. No sustituye asesoría profesional.</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-persona-bar" id="personaBar"></div>
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
      <div class="attachments-preview" id="attachmentsPreview"></div>
      <div class="input-row">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Describa su caso o consulta legal..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <div class="upload-btn">
          <i class="fas fa-paperclip"></i>
          <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt" onchange="handleFiles(this.files)">
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Agregar Figura Legal</div>
    <div class="preset-figures" id="presetGrid"></div>
    <div class="modal-divider">o personalizar</div>
    <div class="custom-inputs">
      <input class="modal-input" id="customName" placeholder="Nombre de la figura">
      <input class="modal-input" id="customEmoji" placeholder="Icono (fa-user, fa-gavel, etc)">
      <textarea class="modal-textarea" id="customDesc" placeholder="Descripción y especialidad..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" onclick="addCustomFigure()">Agregar</button>
    </div>
  </div>
</div>

<script>
// ============================================
// DATOS DE LA APLICACIÓN
// ============================================

const LEGAL_FIGURES = {
  abogado: {
    id: 'abogado',

const QUICK_QUESTIONS = {
  abogado: ['Me deben dinero, ¿cómo cobro?', 'Quiero comprar casa, ¿qué papeles?', 'Me quieren desalojar sin razón', 'Necesito un contrato de trabajo'],

  defensor: ['Detuvieron a mi hermano', 'Me despidieron injustamente', 'No tengo dinero para abogado'],
  mediador: ['Pelea con mi vecino', 'Quiero divorcio de mutuo acuerdo', 'Problemas con mi arrendador']
};

const LEGAL_AREAS = [
  { id: 'civil', name: 'Civil', code: 'Decreto 106', icon: 'fa-file-lines' },
  { id: 'penal', name: 'Penal', code: 'Decreto 17-73', icon: 'fa-gavel' },
  { id: 'laboral', name: 'Laboral', code: 'Decreto 1441', icon: 'fa-briefcase' },
  { id: 'familia', name: 'Familia', code: 'Decreto 106', icon: 'fa-family' },
  { id: 'mercantil', name: 'Mercantil', code: 'Decreto 2-70', icon: 'fa-chart-simple' }
];

// ============================================
// RESPUESTAS PERSONALIZADAS
// ============================================

function generarRespuesta(query, figura, area) {
  const q = query.toLowerCase();
  
  if (q.includes('deuda') || q.includes('cobro') || q.includes('pagaré')) {
    return `Entiendo, le deben dinero. Veamos opciones:

**Si tiene pagaré o factura:** Juicio ejecutivo (3-6 meses)
**Si es solo contrato:** Juicio ordinario (1-2 años)

**Documentos que necesita:**
- El pagaré o contrato original
- DPI del deudor
- Comprobantes de que ha reclamado

**Plazos:** Pagaré prescribe en 3 años, contrato en 5 años.

¿Qué documento tiene de respaldo? Así le digo el camino más rápido.`;
  }
  
  if (q.includes('despido') || q.includes('trabajo') || q.includes('liquidación')) {
    return `Lamento su situación. Si fue despedido sin causa:

**Lo que le corresponde:**
- Indemnización: 1 mes por año trabajado
- Aguinaldo y Bono 14 proporcionales
- Vacaciones no gozadas

**Plazo:** 30 días hábiles para demandar
**Dónde:** Ministerio de Trabajo (gratuito)

¿Cuánto tiempo trabajó y qué salario tenía? Le calculo su liquidación exacta.`;
  }
  
  if (q.includes('divorcio') || q.includes('separación')) {
    return `Sobre su divorcio:

**Si están de acuerdo:**
- Vía notarial: Q.2,000 - Q.3,000 (1-2 meses)
- Vía judicial: Q.1,000 - Q.2,000 (3 meses)

**Si no están de acuerdo:**
- Juicio contencioso: 6-12 meses
- Causales: infidelidad, maltrato, abandono

¿Es de mutuo acuerdo o hay disputa? ¿Tienen hijos menores?`;
  }
  
  if (q.includes('denuncia') || q.includes('robo') || q.includes('mp')) {
    return `Para denunciar:

**Dónde:** MP más cercano a su domicilio
**Qué llevar:** DPI, pruebas (fotos, videos), datos de testigos

**Si es URGENTE:** Llame al 110 (PNC)

¿Qué delito quiere denunciar? ¿Es una emergencia?`;
  }
  
  if (q.includes('contrato') || q.includes('acuerdo')) {
    return `Para hacer un contrato válido en Guatemala:

**Elementos básicos:**
- Identificación de las partes (con DPI)
- Objeto claro (qué se está acordando)
- Precio cierto (en quetzales)
- Fecha y lugar
- Firmas y huellas

**¿Qué tipo de contrato necesita?** (compraventa, arrendamiento, servicios, etc.)`;
  }
  
  if (q.includes('casa') || q.includes('terreno') || q.includes('propiedad')) {
    return `Para comprar una propiedad con seguridad:

**Pasos:**
1. Certificado de libertad de gravamen (Registro General)
2. Constancia municipal de no adeudar
3. Verificar medidas y linderos
4. Escritura con notario (Q.1,500 - Q.3,000)
5. Inscripción en Registro (2-3% del valor)

**¿Ya revisó los papeles del inmueble?**`;
  }
  
  // Respuesta genérica
  return `Gracias por su consulta. Para darle una respuesta precisa, cuénteme:

🔹 **¿Qué pasó exactamente?** (fecha, lugar, personas)
🔹 **¿Qué documentos tiene?** (contratos, pruebas, comunicaciones)
🔹 **¿Qué necesita resolver?**

Con esa información le digo qué ley aplica, dónde ir y cuánto puede tardar.`;
}

// ============================================
// ESTADO Y FUNCIONES PRINCIPALES
// ============================================

let currentFigureId = 'abogado';
let currentArea = 'civil';
let conversationHistory = {};
let isLoading = false;
let pendingFiles = [];

document.addEventListener('DOMContentLoaded', () => {
  Object.keys(LEGAL_FIGURES).forEach(id => { conversationHistory[id] = []; });
  renderFigureBar();
  renderAreas();
  renderQuickTopics();
  updateActiveFigure();
  setupScroll();
  updateStats();
});

function renderFigureBar() {
  const bar = document.getElementById('figureBar');
  bar.innerHTML = Object.values(LEGAL_FIGURES).map(fig => `
    <button class="figure-btn ${fig.id === currentFigureId ? 'active' : ''}" onclick="selectFigure('${fig.id}')">
      <i class="fas ${fig.icon}"></i>
      <span>${fig.name}</span>
    </button>
  `).join('');
}

function renderAreas() {
  const container = document.getElementById('areaList');
  container.innerHTML = LEGAL_AREAS.map(area => `
    <div class="area-card ${area.id === currentArea ? 'active' : ''}" onclick="selectArea('${area.id}')">
      <div class="area-name">${area.name}</div>
      <div class="area-code">${area.code}</div>
    </div>
  `).join('');
}

function renderQuickTopics() {
  const topics = QUICK_QUESTIONS[currentFigureId] || QUICK_QUESTIONS.abogado;
  const container = document.getElementById('quickTopics');
  container.innerHTML = topics.map(q => `
    <button class="topic-btn" onclick="sendQuickTopic('${q.replace(/'/g, "\\'")}')">${q}</button>
  `).join('');
}

function updateActiveFigure() {
  const fig = LEGAL_FIGURES[currentFigureId];
  document.getElementById('sidebarFigureCard').innerHTML = `
    <div class="figure-avatar" style="border-color: ${fig.color}40; color: ${fig.color}">
      <i class="fas ${fig.icon}"></i>
    </div>
    <div>
      <div class="figure-name" style="color: ${fig.color}">${fig.name}</div>
      <div class="figure-role">${fig.role}</div>
      <div class="figure-tags">${fig.tags.map(t => `<span class="tag" style="background: ${fig.color}20; color: ${fig.color}">${t}</span>`).join('')}</div>
    </div>
  `;
  
  document.getElementById('personaBar').innerHTML = `
    <div class="persona-icon" style="border-color: ${fig.color}40; color: ${fig.color}">
      <i class="fas ${fig.icon}"></i>
    </div>
    <div>
      <div class="persona-name" style="color: ${fig.color}">${fig.name}</div>
      <div class="persona-desc">${fig.desc}</div>
    </div>
    <div class="persona-badge"><i class="fas fa-check-circle"></i> Guatemala</div>
  `;
  
  renderMessages();
}

function renderMessages() {
  const history = conversationHistory[currentFigureId] || [];
  const container = document.getElementById('messages');
  const fig = LEGAL_FIGURES[currentFigureId];
  
  if (history.length === 0) {
    container.innerHTML = `
      <div class="welcome-msg">
        <div class="welcome-icon"><i class="fas ${fig.icon}"></i></div>
        <div class="welcome-title">${fig.saludo}</div>
        <div class="welcome-sub">Cuénteme su caso y le daré una respuesta clara y práctica.</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = history.map(msg => buildMessageHTML(msg)).join('');
  container.scrollTop = container.scrollHeight;
}

function buildMessageHTML(msg) {
  const fig = LEGAL_FIGURES[currentFigureId];
  const time = msg.time || new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  
  if (msg.role === 'user') {
    return `
      <div class="msg user">
        <div class="msg-avatar"><i class="fas fa-user"></i></div>
        <div class="msg-content">
          <div class="msg-meta" style="flex-direction: row-reverse">
            <span class="msg-name">Usted</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-bubble"><div class="msg-text">${escapeHtml(msg.content)}</div></div>
        </div>
      </div>
    `;
  }
  
  return `
    <div class="msg assistant">
      <div class="msg-avatar" style="border-color: ${fig.color}40; color: ${fig.color}">
        <i class="fas ${fig.icon}"></i>
      </div>
      <div class="msg-content">
        <div class="msg-meta">
          <span class="msg-name" style="color: ${fig.color}">${fig.name}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble"><div class="msg-text">${formatText(msg.content)}</div></div>
      </div>
    </div>
  `;
}

function formatText(text) {
  let formatted = escapeHtml(text);
  formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  formatted = formatted.replace(/\n\n/g, '</p><p>');
  formatted = formatted.replace(/\n/g, '<br>');
  return `<p>${formatted}</p>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function selectFigure(id) {
  if (!LEGAL_FIGURES[id]) return;
  currentFigureId = id;
  document.querySelectorAll('.figure-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(LEGAL_FIGURES[id].name));
  });
  updateActiveFigure();
  renderQuickTopics();
}

function selectArea(id) {
  currentArea = id;
  document.querySelectorAll('.area-card').forEach(card => {
    card.classList.toggle('active', card.textContent.includes(id));
  });
}

function updateStats() {
  document.getElementById('statFiguras').textContent = Object.keys(LEGAL_FIGURES).length;
  document.getElementById('statCodigos').textContent = Object.keys(LEGAL_AREAS).length * 2 + 2;
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (file.size > 5 * 1024 * 1024) {
      alert('Archivo muy grande. Máximo 5MB');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      pendingFiles.push({
        name: file.name,
        size: file.size,
        preview: file.type.startsWith('image/') ? e.target.result : null
      });
      renderAttachmentsPreview();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('fileInput').value = '';
}

function renderAttachmentsPreview() {
  const container = document.getElementById('attachmentsPreview');
  if (pendingFiles.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = pendingFiles.map((f, i) => `
    <div class="attachment-chip">
      ${f.preview ? `<img src="${f.preview}">` : '<i class="fas fa-file"></i>'}
      <span>${f.name}</span>
      <span class="remove-btn" onclick="removeFile(${i})"><i class="fas fa-times"></i></span>
    </div>
  `).join('');
}

function removeFile(index) {
  pendingFiles.splice(index, 1);
  renderAttachmentsPreview();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if ((!text && pendingFiles.length === 0) || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  const welcome = document.querySelector('.welcome-msg');
  if (welcome) welcome.remove();
  
  const userMsg = {
    role: 'user',
    content: text || '(Archivo adjunto)',
    time: new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }),
    files: [...pendingFiles]
  };
  
  if (!conversationHistory[currentFigureId]) conversationHistory[currentFigureId] = [];
  conversationHistory[currentFigureId].push(userMsg);
  appendMessage(userMsg, true);
  
  pendingFiles = [];
  renderAttachmentsPreview();
  
  const typingId = showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  
  setTimeout(() => {
    const fig = LEGAL_FIGURES[currentFigureId];
    const area = LEGAL_AREAS.find(a => a.id === currentArea);
    const replyText = generarRespuesta(text, fig, area);
    
    removeTyping(typingId);
    
    const assistantMsg = {
      role: 'assistant',
      content: replyText,
      time: new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' })
    };
    
    conversationHistory[currentFigureId].push(assistantMsg);
    appendMessage(assistantMsg, false);
    
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }, 600);
}

function appendMessage(msg, isUser) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'assistant'}`;
  div.innerHTML = buildMessageHTML(msg);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const fig = LEGAL_FIGURES[currentFigureId];
  const id = 'typing-' + Date.now();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg assistant typing-msg';
  div.innerHTML = `
    <div class="msg-avatar" style="border-color: ${fig.color}40; color: ${fig.color}"><i class="fas ${fig.icon}"></i></div>
    <div class="msg-content">
      <div class="msg-meta"><span class="msg-name" style="color: ${fig.color}">${fig.name}</span></div>
      <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function sendQuickTopic(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
}

function setupScroll() {
  const bar = document.getElementById('figureBar');
  const left = document.getElementById('scrollLeft');
  const right = document.getElementById('scrollRight');
  
  const check = () => {
    if (left) left.disabled = bar.scrollLeft <= 0;
    if (right) right.disabled = bar.scrollLeft >= bar.scrollWidth - bar.clientWidth;
  };
  
  if (left) left.onclick = () => { bar.scrollBy({ left: -200, behavior: 'smooth' }); setTimeout(check, 100); };
  if (right) right.onclick = () => { bar.scrollBy({ left: 200, behavior: 'smooth' }); setTimeout(check, 100); };
  bar.addEventListener('scroll', check);
  setTimeout(check, 100);
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectPreset(id, el) {
  document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function addCustomFigure() {
  const name = document.getElementById('customName').value.trim();
  const emoji = document.getElementById('customEmoji').value.trim() || 'fa-user';
  const desc = document.getElementById('customDesc').value.trim();
  
  if (!name) {
    alert('Ingrese un nombre');
    return;
  }
  
  const id = 'custom_' + Date.now();
  const colors = ['#c9a84c', '#8a4cc9', '#c94c4c', '#4caa6a', '#4c7ac9', '#4caaa0'];
  
  LEGAL_FIGURES[id] = {
    id: id,
    icon: emoji,
    name: name,
    color: colors[Math.floor(Math.random() * colors.length)],
    role: 'Especialista',
    tags: ['Personalizada'],
    desc: desc || name,
    saludo: `Soy ${name}. Cuénteme su caso.`
  };
  
  QUICK_QUESTIONS[id] = ['¿Cuál es su especialidad?', '¿Cómo puede ayudarme?'];
  conversationHistory[id] = [];
  
  const bar = document.getElementById('figureBar');
  const btn = document.createElement('button');
  btn.className = 'figure-btn';
  btn.onclick = () => selectFigure(id);
  btn.innerHTML = `<i class="fas ${emoji}"></i><span>${name}</span>`;
  bar.appendChild(btn);
  
  closeModal();
  selectFigure(id);
  updateStats();
}
</script>
